<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日论文详情 - EvilCalf</title>
    <!-- MathJax for LaTeX formulas -->
    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        renderActions: {
          addMenu: []
        }
      },
      startup: {
        pageReady: () => {
          console.log('MathJax 已加载完成');
          return MathJax.startup.defaultPageReady();
        }
      }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #a855f7;
            --secondary: #6366f1;
            --accent: #ec4899;
            --glow: #c084fc;
            --bg-dark: #0f0c29;
            --card-bg: rgba(30, 30, 50, 0.8);
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            padding: 40px 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(168, 85, 247, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
            box-shadow: 0 0 10px var(--glow), 0 0 20px var(--primary);
        }
        .particle:nth-child(2) { left: 20%; animation-delay: -2s; animation-duration: 12s; }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; animation-duration: 18s; }
        .particle:nth-child(4) { left: 60%; animation-delay: -6s; animation-duration: 14s; }
        .particle:nth-child(5) { left: 80%; animation-delay: -8s; animation-duration: 16s; }
        
        .layout {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* 左侧固定目录 */
        .sidebar {
            position: sticky;
            top: 40px;
            width: 320px;
            flex-shrink: 0;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .sidebar-header {
            padding: 25px 25px 15px 25px;
            flex-shrink: 0;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 25px 25px 25px;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }
        
        .toc-header {
            font-size: 1.3em;
            color: var(--glow);
            margin-bottom: 20px;
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .toc-back-btn {
            font-size: 0.85em;
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .toc-back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }
        
        .toc-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 10px;
        }
        
        .toc-stat-item {
            text-align: center;
        }
        
        .toc-stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--glow);
        }
        
        .toc-stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .toc-section {
            margin-bottom: 20px;
        }
        
        .toc-section-title {
            font-size: 1em;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
            padding-left: 10px;
            border-left: 3px solid var(--accent);
        }
        
        .toc-paper-list {
            list-style: none;
        }
        
        .toc-paper-item {
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85em;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid transparent;
        }
        
        .toc-paper-item:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--primary);
            transform: translateX(5px);
        }
        
        .toc-paper-item.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: var(--glow);
            color: #fff;
            font-weight: 600;
        }
        
        .toc-paper-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 右侧主内容 */
        .main-content {
            flex: 1;
            min-width: 0;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #fff, var(--glow), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--glow);
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 50px;
            scroll-margin-top: 40px;
        }
        
        .section-title {
            font-size: 1.6em;
            color: var(--glow);
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }
        
        .paper-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            transition: all 0.3s ease;
            scroll-margin-top: 40px;
        }
        
        .paper-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
            border-color: var(--primary);
        }
        
        .paper-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .paper-chinese-title {
            font-size: 1em;
            color: var(--glow);
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .paper-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .paper-date {
            color: var(--glow);
        }
        
        .paper-category {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .paper-brief {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .paper-brief p, .paper-brief ul {
            margin-bottom: 10px;
        }
        
        .paper-brief ul {
            padding-left: 20px;
        }
        
        .paper-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .paper-link:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        
        .paper-details {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
        }
        
        .details-summary {
            cursor: pointer;
            color: var(--glow);
            font-weight: 600;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .details-summary::-webkit-details-marker {
            display: none;
        }
        
        .details-summary:hover {
            color: var(--accent);
        }
        
        .details-content {
            margin-top: 25px;
            padding-top: 25px;
            padding-left: 10px;
            border-top: 2px solid rgba(168, 85, 247, 0.4);
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding-bottom: 10px;
        }
        
        .summary-block {
            margin-bottom: 25px;
            padding-left: 15px;
            border-left: 3px solid rgba(168, 85, 247, 0.3);
            padding-bottom: 15px;
        }
        
        .summary-block:last-child {
            border-left: none;
            margin-bottom: 0;
        }
        
        .summary-block h4 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .summary-block p, .summary-block ul {
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.8;
            font-size: 0.95em;
            margin-bottom: 8px;
        }
        
        .summary-block ul {
            padding-left: 25px;
            margin-left: 10px;
            margin-bottom: 12px;
        }
        
        .summary-block ul li {
            margin-bottom: 8px;
            position: relative;
            padding-left: 5px;
        }
        
        .summary-block > ul > li {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }
        
        .summary-block > ul > li::before {
            content: "▹";
            color: var(--accent);
            font-weight: bold;
            position: absolute;
            left: -20px;
        }
        
        /* 嵌套列表 - 第二层 */
        .summary-block ul ul {
            padding-left: 20px;
            margin-top: 8px;
            margin-bottom: 8px;
            border-left: 2px solid rgba(168, 85, 247, 0.2);
            padding-bottom: 8px;
        }
        
        .summary-block ul ul li {
            margin-bottom: 5px;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .summary-block ul ul li::before {
            content: "•";
            color: var(--primary);
            position: absolute;
            left: -15px;
            font-size: 1.2em;
        }
        
        /* 嵌套列表 - 第三层 */
        .summary-block ul ul ul {
            padding-left: 18px;
            margin-top: 5px;
            border-left: 2px solid rgba(168, 85, 247, 0.15);
        }
        
        .summary-block ul ul ul li::before {
            content: "◦";
            color: var(--secondary);
            left: -12px;
        }
        
        /* 列表中的加粗文本 */
        .summary-block strong {
            color: var(--glow);
            font-weight: 600;
        }
        
        /* 列表中的行内代码 */
        .summary-block code {
            background: rgba(168, 85, 247, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--glow);
        }
        
        .summary-block table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .summary-block th, .summary-block td {
            border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 10px;
            text-align: left;
        }
        
        .summary-block th {
            background: rgba(168, 85, 247, 0.2);
            color: var(--glow);
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }
        
        footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        footer a:hover {
            color: var(--glow);
        }
        
        @media (max-width: 1200px) {
            .layout {
                flex-direction: column;
            }
            .sidebar {
                display: none; /* 移动端隐藏目录 */
            }
        }
        
        /* 移动端目录切换按钮 */
        .mobile-toc-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            padding: 15px 20px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mobile-toc-toggle:hover {
            transform: scale(1.05);
        }
        
        /* 移动端弹出目录 */
        .mobile-toc {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1001;
            background: rgba(15, 12, 41, 0.98);
            overflow-y: auto;
        }
        
        .mobile-toc.open {
            display: block;
        }
        
        .mobile-toc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
            font-size: 1.2em;
            font-weight: 600;
            color: var(--glow);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .mobile-toc-header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .mobile-toc-back-btn {
            font-size: 0.8em;
            padding: 6px 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .mobile-toc-back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }
        
        .mobile-toc-close {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px 10px;
        }
        
        .mobile-toc-stats {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(168, 85, 247, 0.1);
            flex-shrink: 0;
        }
        
        .mobile-toc-content {
            flex: 1;
            overflow-y: auto;
        }
        
        #mobile-toc-container {
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            h1 { font-size: 1.8em; }
            .stats { flex-direction: column; align-items: center; }
            .paper-title { font-size: 1.1em; }
            .mobile-toc-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="layout">
        <!-- 左侧固定目录 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="toc-header">
                    <span>📑 论文目录</span>
                    <a href="./" class="toc-back-btn">← 回主页</a>
                </div>
                
                <div class="toc-stats">
                    <div class="toc-stat-item">
                        <div class="toc-stat-number" id="toc-total">-</div>
                        <div class="toc-stat-label">论文</div>
                    </div>
                    <div class="toc-stat-item">
                        <div class="toc-stat-number" id="toc-categories">-</div>
                        <div class="toc-stat-label">分类</div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div id="toc-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </aside>
        
        <!-- 移动端目录切换按钮 -->
        <button class="mobile-toc-toggle" onclick="toggleMobileTOC()">
            📑 目录
        </button>
        
        <!-- 移动端弹出目录 -->
        <div class="mobile-toc" id="mobile-toc">
            <div class="mobile-toc-header">
                <span>📑 论文目录</span>
                <div class="mobile-toc-header-actions">
                    <a href="./" class="mobile-toc-back-btn">← 回主页</a>
                    <button class="mobile-toc-close" onclick="toggleMobileTOC()">✕</button>
                </div>
            </div>
            <div class="mobile-toc-stats">
                <div class="toc-stat-item">
                    <div class="toc-stat-number" id="mobile-toc-total">-</div>
                    <div class="toc-stat-label">论文</div>
                </div>
                <div class="toc-stat-item">
                    <div class="toc-stat-number" id="mobile-toc-categories">-</div>
                    <div class="toc-stat-label">分类</div>
                </div>
            </div>
            <div class="mobile-toc-content">
                <div id="mobile-toc-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <header>
                <h1>📚 每日论文详情</h1>
                <div class="stats" id="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="total-count">-</div>
                        <div class="stat-label">论文总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="category-count">-</div>
                        <div class="stat-label">研究方向</div>
                    </div>
                </div>
            </header>

            <div id="content">
                <div class="loading">正在加载论文数据...</div>
            </div>

            <footer>
                <p>每日论文推送系统 | <a href="./">返回首页</a></p>
            </footer>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        let paperIndex = 0;
        
        if (!date) {
            document.getElementById('content').innerHTML = '<div class="loading">错误：缺少日期参数</div>';
        } else {
            loadPapers(date);
        }

        async function loadPapers(date) {
            try {
                const response = await fetch(`./${date}.json`);
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                
                document.getElementById('total-count').textContent = data.total_count;
                document.getElementById('category-count').textContent = data.category_count;
                document.getElementById('toc-total').textContent = data.total_count;
                document.getElementById('toc-categories').textContent = data.category_count;
                
                renderPapers(data);
                generateTOC(data);
                
                // 等待 MathJax 加载并渲染公式
                await waitForMathJax();
                
                // 初始化滚动监听
                initScrollSpy();
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="loading">加载失败：${error.message}</div>`;
            }
        }

        async function waitForMathJax() {
            // 等待 MathJax 加载完成
            if (!window.MathJax) {
                console.log('等待 MathJax 加载...');
                await new Promise(resolve => setTimeout(resolve, 100));
                return waitForMathJax();
            }
            
            // 等待 MathJax 准备就绪
            if (MathJax.startup && !MathJax.startup.document) {
                console.log('等待 MathJax 初始化...');
                await new Promise(resolve => setTimeout(resolve, 100));
                return waitForMathJax();
            }
            
            // 渲染公式
            try {
                await MathJax.typesetPromise();
                console.log('✅ MathJax 渲染完成');
            } catch (err) {
                console.error('❌ MathJax 渲染失败:', err);
            }
        }

        function generateTOC(data) {
            const container = document.getElementById('toc-container');
            const mobileContainer = document.getElementById('mobile-toc-container');
            let html = '';
            paperIndex = 0;
            
            for (let i = 0; i < data.categories.length; i++) {
                const category = data.categories[i];
                html += `
                    <div class="toc-section">
                        <div class="toc-section-title">${category.name}</div>
                        <ul class="toc-paper-list">
                `;
                
                for (let j = 0; j < category.papers.length; j++) {
                    const paper = category.papers[j];
                    const idx = paperIndex++;
                    const shortTitle = paper.title.length > 40 ? paper.title.substring(0, 40) + '...' : paper.title;
                    html += `
                        <li class="toc-paper-item" data-index="${idx}" onclick="scrollToPaper('paper-${idx}')">
                            <div class="toc-paper-title">${escapeHtml(shortTitle)}</div>
                        </li>
                    `;
                }
                
                html += `</ul></div>`;
            }
            
            container.innerHTML = html;
            // 同时更新移动端目录（如果已打开）
            if (mobileContainer) {
                mobileContainer.innerHTML = html;
            }
        }

        function scrollToPaper(id) {
            const paper = document.getElementById(id);
            if (paper) {
                paper.scrollIntoView({ behavior: 'smooth', block: 'start' });
                // 更新高亮
                updateActivePaper(id);
                // 如果是移动端，关闭目录
                if (window.innerWidth <= 768) {
                    const mobileToc = document.getElementById('mobile-toc');
                    mobileToc.classList.remove('open');
                }
            }
        }

        function updateActivePaper(paperId) {
            // 移除所有高亮
            document.querySelectorAll('.toc-paper-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // 添加当前高亮
            const index = paperId.replace('paper-', '');
            const activeItem = document.querySelector(`.toc-paper-item[data-index="${index}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                // 滚动目录使高亮项可见
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
            }
        }

        function initScrollSpy() {
            // 只在桌面端启用同步滚动（屏幕宽度 > 1200px）
            if (window.innerWidth <= 1200) {
                return;
            }
            
            const observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const paperId = entry.target.id;
                            updateActivePaper(paperId);
                        }
                    });
                },
                {
                    rootMargin: '-20% 0px -60% 0px',
                    threshold: 0
                }
            );
            
            // 监听所有论文卡片
            document.querySelectorAll('.paper-card').forEach(card => {
                observer.observe(card);
            });
        }

        function renderPapers(data) {
            const content = document.getElementById('content');
            let html = '';
            paperIndex = 0;
            
            for (let i = 0; i < data.categories.length; i++) {
                const category = data.categories[i];
                html += `
                    <section class="section" id="section-${i}">
                        <h2 class="section-title">${category.name}</h2>
                `;
                
                for (let j = 0; j < category.papers.length; j++) {
                    const paper = category.papers[j];
                    const idx = paperIndex++;
                    html += `
                        <article class="paper-card" id="paper-${idx}">
                            <h3 class="paper-title">${escapeHtml(paper.title)}</h3>
                            ${paper.chinese_title ? `<div class="paper-chinese-title">${escapeHtml(paper.chinese_title)}</div>` : ''}
                            <div class="paper-meta">
                                <span class="paper-date">📅 ${paper.published}</span>
                                <span class="paper-category">${paper.category}</span>
                            </div>
                            <div class="paper-brief">${paper.brief}</div>
                            <a href="${paper.link}" target="_blank" class="paper-link">📄 查看论文</a>
                            
                            <details class="paper-details">
                                <summary class="details-summary">📖 展开 AI 深度解读</summary>
                                <div class="details-content">
                                    ${paper.details.research_goal ? `<div class="summary-block"><h4>🎯 研究目标</h4>${paper.details.research_goal}</div>` : ''}
                                    ${paper.details.method ? `<div class="summary-block"><h4>⚙️ 方法概述</h4>${paper.details.method}</div>` : ''}
                                    ${paper.details.results ? `<div class="summary-block"><h4>📊 关键结果</h4>${paper.details.results}</div>` : ''}
                                    ${paper.details.conclusion ? `<div class="summary-block"><h4>💡 简要结论</h4>${paper.details.conclusion}</div>` : ''}
                                </div>
                            </details>
                        </article>
                    `;
                }
                
                html += '</section>';
            }
            
            content.innerHTML = html;
            
            // 绑定展开事件，展开时渲染公式
            document.querySelectorAll('details').forEach(detail => {
                detail.addEventListener('toggle', () => {
                    if (detail.open && window.MathJax && MathJax.typesetPromise) {
                        MathJax.typesetPromise([detail]).catch((err) => {
                            console.error('MathJax 渲染失败:', err);
                        });
                    }
                });
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            // 如果已经是 HTML（包含标签），直接返回
            if (text.includes('<')) return text;
            // 否则转义
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleMobileTOC() {
            const mobileToc = document.getElementById('mobile-toc');
            mobileToc.classList.toggle('open');
            
            // 复制桌面端目录内容到移动端
            if (mobileToc.classList.contains('open')) {
                const desktopToc = document.getElementById('toc-container');
                const mobileTocContainer = document.getElementById('mobile-toc-container');
                if (desktopToc && mobileTocContainer) {
                    mobileTocContainer.innerHTML = desktopToc.innerHTML;
                    // 更新统计
                    document.getElementById('mobile-toc-total').textContent = document.getElementById('toc-total').textContent;
                    document.getElementById('mobile-toc-categories').textContent = document.getElementById('toc-categories').textContent;
                }
            }
        }
    </script>
</body>
</html>
